<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8f5">
  <meta name="description" content="Mass+ aide à organiser une prise de poids rapide et saine en mode local/offline.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mass+">
  <title>Mass+ · prise de poids locale</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <noscript>Mass+ nécessite JavaScript pour fonctionner.</noscript>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand">Mass<span>+</span></div>
      <p class="sidebar-subtitle">Prise de poids locale, sans compte.</p>
      <nav id="desktop-nav" class="desktop-nav" aria-label="Navigation principale"></nav>
      <div class="privacy-card">
        <strong>Mode local</strong>
        <span>Aucun email. Aucune donnée envoyée sans action claire.</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p id="today-label" class="muted-label"></p>
          <h1 id="screen-title">Mass+</h1>
        </div>
        <button id="install-hint" class="ghost-button" type="button">Installer</button>
      </header>

      <section id="screen" class="screen" aria-live="polite"></section>
    </main>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Navigation mobile"></nav>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
